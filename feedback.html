<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Штиль · Отзыв</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --color-bg: #0a141b;
    --color-bg-deep: #060d12;
    --color-panel: #10222b;
    --color-panel-alt: #142a34;
    --color-line: #1e3540;

    --color-brass: #c9a667;
    --color-brass-bright: #dfc088;
    --color-brass-dim: rgba(201, 166, 103, 0.16);

    --color-text: #e9eef0;
    --color-text-muted: #7e97a2;
    --color-text-faint: #4d626b;

    --font-display: "Fraunces", serif;
    --font-body: "Inter", -apple-system, sans-serif;
    --font-mono: "JetBrains Mono", monospace;

    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    min-height: 100%;
    overflow-x: hidden;
    background: var(--color-bg);
    color: var(--color-text);
    font-family: var(--font-body);
  }

  body {
    background: radial-gradient(120% 60% at 50% 0%, var(--color-bg) 0%, var(--color-bg-deep) 100%);
    display: flex;
    justify-content: center;
  }

  .ambient {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(55% 30% at 15% 90%, rgba(201, 166, 103, 0.06), transparent 60%),
      radial-gradient(45% 28% at 90% 8%, rgba(90, 140, 155, 0.09), transparent 60%);
  }

  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    padding: calc(40px + var(--safe-top)) 24px calc(32px + var(--safe-bottom));
    display: flex;
    flex-direction: column;
  }

  /* ---------- Заголовок ---------- */

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--color-brass);
    text-align: center;
    opacity: 0;
    animation: riseIn 0.6s ease forwards;
    animation-delay: 0.05s;
  }

  .headline {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 30px;
    line-height: 1.22;
    letter-spacing: -0.01em;
    text-align: center;
    margin-top: 16px;
    opacity: 0;
    animation: riseIn 0.6s ease forwards;
    animation-delay: 0.15s;
  }

  .subheadline {
    font-size: 15px;
    color: var(--color-text-muted);
    text-align: center;
    margin-top: 12px;
    line-height: 1.5;
    opacity: 0;
    animation: riseIn 0.6s ease forwards;
    animation-delay: 0.25s;
  }

  /* ---------- Форма ---------- */

  #feedback-form {
    margin-top: 44px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .field-block {
    opacity: 0;
    animation: riseIn 0.6s ease forwards;
  }

  .field-block:nth-of-type(1) { animation-delay: 0.35s; }
  .field-block:nth-of-type(2) { animation-delay: 0.45s; }

  .field-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-muted);
    letter-spacing: 0.02em;
    margin-bottom: 16px;
    display: block;
    text-align: center;
  }

  /* Звёзды */

  .stars {
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  .star-btn {
    background: none;
    border: none;
    padding: 6px;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .star-btn svg {
    width: 40px;
    height: 40px;
    display: block;
  }

  .star-btn path {
    fill: none;
    stroke: var(--color-line);
    stroke-width: 1.4;
    transition: fill 0.25s ease, stroke 0.25s ease;
  }

  .star-btn.is-active path {
    fill: var(--color-brass);
    stroke: var(--color-brass-bright);
  }

  .star-btn:active { transform: scale(0.88); }

  .stars.is-shake { animation: shake 0.4s ease; }

  .rating-caption {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--color-brass-bright);
    height: 18px;
    margin-top: 14px;
    letter-spacing: 0.02em;
  }

  /* Комментарий */

  .comment-wrap {
    margin-top: 8px;
  }

  textarea {
    width: 100%;
    min-height: 108px;
    resize: none;
    background: var(--color-panel);
    border: 1px solid var(--color-line);
    border-radius: 10px;
    padding: 16px;
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--color-text);
    line-height: 1.5;
    transition: border-color 0.3s ease, background 0.3s ease;
  }

  textarea::placeholder { color: var(--color-text-faint); }

  textarea:focus {
    outline: none;
    border-color: var(--color-brass);
    background: var(--color-panel-alt);
  }

  /* Кнопка отправки */

  .submit-wrap {
    margin-top: auto;
    padding-top: 32px;
    opacity: 0;
    animation: riseIn 0.6s ease forwards;
    animation-delay: 0.55s;
  }

  .submit-btn {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 10px;
    background: var(--color-brass);
    color: var(--color-bg-deep);
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 16px 32px -16px rgba(201, 166, 103, 0.5);
  }

  .submit-btn:active { transform: scale(0.98); }

  .submit-btn:hover { background: var(--color-brass-bright); }

  .submit-hint {
    text-align: center;
    font-size: 12px;
    color: var(--color-text-faint);
    margin-top: 14px;
  }

  /* ---------- Экран благодарности ---------- */

  #thanks-screen {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 32px;
    background: radial-gradient(120% 60% at 50% 0%, var(--color-bg) 0%, var(--color-bg-deep) 100%);
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  #thanks-screen.is-visible {
    display: flex;
    opacity: 1;
  }

  .thanks-mark {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    border: 1px solid var(--color-brass);
    background: var(--color-brass-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    transform: scale(0.7);
    opacity: 0;
    animation: markIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    animation-delay: 0.15s;
  }

  .thanks-mark svg { width: 30px; height: 30px; }

  .thanks-mark path {
    fill: none;
    stroke: var(--color-brass-bright);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .thanks-title {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 26px;
    line-height: 1.3;
    opacity: 0;
    animation: riseIn 0.6s ease forwards;
    animation-delay: 0.3s;
  }

  .thanks-subtitle {
    margin-top: 14px;
    font-size: 14px;
    color: var(--color-text-muted);
    max-width: 300px;
    line-height: 1.6;
    opacity: 0;
    animation: riseIn 0.6s ease forwards;
    animation-delay: 0.4s;
  }

  /* ---------- Анимации ---------- */

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes markIn {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="ambient"></div>

<div class="page" id="page">
  <span class="eyebrow">Кофейня «Штиль» · Актау</span>
  <h1 class="headline" id="headline">Оставьте отзыв о нашей кофейне</h1>
  <p class="subheadline">Ваше мнение помогает нам держать курс на качество</p>

  <form id="feedback-form">
    <div class="field-block">
      <span class="field-label">Как оцените обслуживание?</span>
      <div class="stars" id="stars">
        <button type="button" class="star-btn" data-value="1" aria-label="1 звезда">
          <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 6.2 6.8.7-5 4.7 1.4 6.7L12 17.6l-6.1 3.2 1.4-6.7-5-4.7 6.8-.7z"/></svg>
        </button>
        <button type="button" class="star-btn" data-value="2" aria-label="2 звезды">
          <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 6.2 6.8.7-5 4.7 1.4 6.7L12 17.6l-6.1 3.2 1.4-6.7-5-4.7 6.8-.7z"/></svg>
        </button>
        <button type="button" class="star-btn" data-value="3" aria-label="3 звезды">
          <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 6.2 6.8.7-5 4.7 1.4 6.7L12 17.6l-6.1 3.2 1.4-6.7-5-4.7 6.8-.7z"/></svg>
        </button>
        <button type="button" class="star-btn" data-value="4" aria-label="4 звезды">
          <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 6.2 6.8.7-5 4.7 1.4 6.7L12 17.6l-6.1 3.2 1.4-6.7-5-4.7 6.8-.7z"/></svg>
        </button>
        <button type="button" class="star-btn" data-value="5" aria-label="5 звёзд">
          <svg viewBox="0 0 24 24"><path d="M12 2.5l2.9 6.2 6.8.7-5 4.7 1.4 6.7L12 17.6l-6.1 3.2 1.4-6.7-5-4.7 6.8-.7z"/></svg>
        </button>
      </div>
      <div class="rating-caption" id="rating-caption"></div>
    </div>

    <div class="field-block comment-wrap">
      <span class="field-label">Комментарий (по желанию)</span>
      <textarea id="comment" placeholder="Что понравилось, а что можно улучшить?"></textarea>
    </div>

    <div class="submit-wrap">
      <button type="submit" class="submit-btn">Отправить отзыв</button>
      <p class="submit-hint">Отзыв анонимный и займёт меньше минуты</p>
    </div>
  </form>
</div>

<div id="thanks-screen">
  <div class="thanks-mark">
    <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
  </div>
  <h2 class="thanks-title">Спасибо за ваш отзыв!</h2>
  <p class="thanks-subtitle">Вы помогаете нам стать лучше на волнах Каспия.</p>
</div>

<!-- Яндекс.Метрика -->
<!-- Логика страницы -->
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const baristaId = urlParams.get("staff");
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyXMPd1JZebIeGPigGQDgPGndeJacY117CZdBWjANbRqkd0KgwJPurMKMiOwP4a8bEN/exec";

  const staffNames = {
    islam: "Исламе",
    dias: "Диасе",
    baha: "Бахе"
  };

  const headlineEl = document.getElementById("headline");
  const staffName = staffNames[baristaId];

  if (staffName) {
    headlineEl.textContent = "Оставьте отзыв о бариста " + staffName;
  }

  const starsWrap = document.getElementById("stars");
  const starButtons = document.querySelectorAll(".star-btn");
  const ratingCaption = document.getElementById("rating-caption");
  const form = document.getElementById("feedback-form");
  const thanksScreen = document.getElementById("thanks-screen");

  const ratingLabels = {
    1: "Совсем не понравилось",
    2: "Могло быть лучше",
    3: "В целом неплохо",
    4: "Хорошо",
    5: "Отлично!"
  };

  let selectedRating = 0;

  function renderStars(value) {
    starButtons.forEach((btn) => {
      const btnValue = Number(btn.getAttribute("data-value"));
      btn.classList.toggle("is-active", btnValue <= value);
    });
    ratingCaption.textContent = value ? ratingLabels[value] : "";
  }

  starButtons.forEach((btn) => {
    btn.addEventListener("click", () => {
      selectedRating = Number(btn.getAttribute("data-value"));
      renderStars(selectedRating);
    });
  });

  form.addEventListener("submit", function (event) {
    event.preventDefault();

    if (selectedRating === 0) {
      starsWrap.classList.remove("is-shake");
      // перезапуск анимации
      void starsWrap.offsetWidth;
      starsWrap.classList.add("is-shake");
      return;
    }

    const commentValue = document.getElementById("comment").value.trim();

    // Собираем данные строго в правильном формате чисел и строк
    const feedbackData = {
      barista: String(baristaId || "unknown"),
      rating: Number(selectedRating), // Явно приводим к числу!
      comment: String(commentValue)
    };

    fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(feedbackData)
    })
    .catch(err => console.error('Ошибка отправки в базу:', err));

    // 2. ОТПРАВКА ЦЕЛИ В ЯНДЕКС.МЕТРИКУ
    if (typeof ym === "function") {
      ym(110849170, "reachGoal", "feedback_submitted", {
        barista: baristaId || "unknown",
        rating: selectedRating,
        hasComment: commentValue.length > 0
      });
    }

    // 3. АНИМАЦИЯ УСПЕШНОЙ ОТПРАВКИ И ЭКРАН СПАСИБО
    document.getElementById("page").style.transition = "opacity 0.5s ease, transform 0.5s ease";
    document.getElementById("page").style.opacity = "0";
    document.getElementById("page").style.transform = "translateY(-12px)";

    setTimeout(() => {
      thanksScreen.classList.add("is-visible");
    }, 350);
  });
</script>

   ym(110849170, "init", {
        clickmap:true,

   // АВТОМАТИЧЕСКИЙ СБОР БАРИСТА В ОТЧЁТЫ

</script>
